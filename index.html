<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>在线文件编辑器</title>
  <style>
    body {margin:0;padding:15px; font-family: Arial;}
    #tokenInput { width: 100%; padding: 10px; margin-bottom: 10px; }
    textarea { width:100%; height:400px; padding:10px; box-sizing:border-box; }
    button { padding:10px 20px; margin:5px; background:#000; color:#fff; border:none; cursor:pointer; }
  </style>
</head>
<body>

  <input id="tokenInput" placeholder="在这里输入你的令牌" type="password">
  <button onclick="loadFile()">加载文件</button>
  <button onclick="saveFile()">保存到 GitHub</button>

  <textarea id="fileContent"></textarea>

  <script src="./github-file-editor.js"></script>
  <script>
    let editor;

    // 配置（这里不写 token！）
    function initEditor() {
      const token = document.getElementById('tokenInput').value;
      editor = new GitHubFileEditor({
        token: token,
        owner: 'DarrenHost',
        repo: 'gitdb',
        branch: 'main'
      });
    }

    // 加载文件
    async function loadFile() {
      initEditor();
      try {
        const file = await editor.getFile('README.md');
        document.getElementById('fileContent').value = file.content;
        alert('加载成功！');
      } catch (e) {
        alert('加载失败：' + e.message);
      }
    }

    // 保存文件
    async function saveFile() {
      initEditor();
      const content = document.getElementById('fileContent').value;
      try {
        await editor.updateFile('README.md', content, 'web edit');
        alert('✅ 保存成功！');
      } catch (e) {
        alert('失败：' + e.message);
      }
    }
  </script>
</body>
</html>
