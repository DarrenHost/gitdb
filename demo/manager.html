<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitDB Manager - 数据库管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4444;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1b2a 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            background: var(--bg-input);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-test {
            background: linear-gradient(135deg, #ffaa00 0%, #cc8800 100%);
            color: #fff;
        }

        /* Config Panel */
        .config-panel {
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .config-panel h3 {
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            padding: 10px 15px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        /* Main Content */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-card .label {
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .toolbar-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 10px 15px 10px 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            width: 300px;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #00cc6a 100%);
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #cc0000 100%);
            color: #fff;
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Database List */
        .db-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .db-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .db-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .db-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .db-card h3 {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .db-card-stats {
            display: flex;
            gap: 15px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .db-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .db-card-actions .btn {
            flex: 1;
            justify-content: center;
            padding: 8px 12px;
            font-size: 13px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: all 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Data Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--bg-input);
            color: var(--primary);
            font-weight: 600;
        }

        .data-table tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            min-width: 300px;
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--danger);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .toolbar {
                flex-direction: column;
            }

            .search-box input {
                width: 100%;
            }

            .db-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">
                <h1>🗄️ GitDB Manager</h1>
                <span>v2.0</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="showConfig()">⚙️ 配置</button>
                <button class="btn btn-test" onclick="testConnection()">🔌 测试</button>
                <button class="btn btn-primary" onclick="refreshAll()">🔄 刷新</button>
            </div>
        </div>
    </header>

    <!-- Config Panel -->
    <div class="config-panel" id="configPanel" style="display: none;">
        <h3>⚙️ 连接配置</h3>
        <div class="config-grid">
            <div class="form-group">
                <label>Worker URL</label>
                <input type="url" id="workerUrl" placeholder="https://gitdb-server.xxx.workers.dev" />
            </div>
            <div class="form-group">
                <label>数据目录</label>
                <input type="text" id="dataDir" value="data" placeholder="data" />
            </div>
        </div>
        <div style="margin-top: 15px;">
            <button class="btn btn-success" onclick="saveConfig()">💾 保存配置</button>
            <button class="btn btn-test" onclick="testConnection()">🔌 测试连接</button>
            <button class="btn btn-primary" onclick="refreshAll()">🔄 刷新列表</button>
        </div>
    </div>

    <!-- Main Content -->
    <main>
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="statDatabases">0</div>
                <div class="label">数据库数量</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statRecords">0</div>
                <div class="label">总记录数</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statSize">0 KB</div>
                <div class="label">总大小</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索数据库..." oninput="filterDatabases()" />
                </div>
            </div>
            <button class="btn btn-primary" onclick="showCreateModal()">➕ 创建数据库</button>
        </div>

        <!-- Database List -->
        <div class="db-grid" id="dbGrid">
            <div class="empty-state">
                <h3>📦 暂无数据库</h3>
                <p>点击上方按钮创建第一个数据库</p>
            </div>
        </div>
    </main>

    <!-- Create Database Modal -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <h2>➕ 创建数据库</h2>
                <button class="modal-close" onclick="closeModal('createModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>数据库名称 *</label>
                    <input type="text" id="createName" placeholder="users" />
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>描述</label>
                    <input type="text" id="createDesc" placeholder="用户数据库" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('createModal')">取消</button>
                <button class="btn btn-primary" onclick="createDatabase()">创建</button>
            </div>
        </div>
    </div>

    <!-- View Data Modal -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal" style="max-width: 900px;">
            <div class="modal-header">
                <h2 id="viewTitle">📊 数据查看</h2>
                <button class="modal-close" onclick="closeModal('viewModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <button class="btn btn-primary" onclick="showAddRecordModal()">➕ 添加记录</button>
                        <button class="btn btn-secondary" onclick="refreshCurrentDb()">🔄 刷新</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="recordSearch" placeholder="搜索记录..." oninput="filterRecords()" style="width: 250px;" />
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table" id="dataTable">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('viewModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- Add Record Modal -->
    <div class="modal-overlay" id="addRecordModal">
        <div class="modal">
            <div class="modal-header">
                <h2>➕ 添加记录</h2>
                <button class="modal-close" onclick="closeModal('addRecordModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>JSON 数据 *</label>
                    <textarea id="recordData" style="width: 100%; min-height: 200px; padding: 10px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: monospace;" placeholder='{"name": "John", "email": "john@example.com"}'></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addRecordModal')">取消</button>
                <button class="btn btn-primary" onclick="addRecord()">添加</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ═══════════════════════════════════════════════════════════
        // 状态管理
        // ═══════════════════════════════════════════════════════════
        let state = {
            workerUrl: localStorage.getItem('gitdb_worker_url') || '',
            dataDir: localStorage.getItem('gitdb_data_dir') || 'data',
            databases: [],
            currentDb: null,
            currentRecords: [],
            filteredRecords: []
        };

        // ═══════════════════════════════════════════════════════════
        // 工具函数
        // ═══════════════════════════════════════════════════════════
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        async function api(endpoint, method = 'GET', body = null) {
            if (!state.workerUrl) {
                showToast('请先配置 Worker URL', 'error');
                showConfig();
                throw new Error('Not configured');
            }

            const url = `${state.workerUrl}${endpoint}`;
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (body) {
                options.body = JSON.stringify(body);
            }

            const response = await fetch(url, options);
            const data = await response.json();

            if (!data.success && response.status !== 200) {
                throw new Error(data.error || 'Request failed');
            }

            return data;
        }

        // ═══════════════════════════════════════════════════════════
        // 配置管理
        // ═══════════════════════════════════════════════════════════
        function showConfig() {
            const panel = document.getElementById('configPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            document.getElementById('workerUrl').value = state.workerUrl;
            document.getElementById('dataDir').value = state.dataDir;
        }

        function saveConfig() {
            state.workerUrl = document.getElementById('workerUrl').value.trim();
            state.dataDir = document.getElementById('dataDir').value.trim();
            
            if (!state.workerUrl) {
                showToast('Worker URL 不能为空', 'error');
                return;
            }

            localStorage.setItem('gitdb_worker_url', state.workerUrl);
            localStorage.setItem('gitdb_data_dir', state.dataDir);
            showToast('配置已保存');
            refreshAll();
        }

        async function testConnection() {
            try {
                const data = await api('/health');
                showToast('连接成功！' + new Date(data.timestamp).toLocaleString());
            } catch (e) {
                showToast('连接失败：' + e.message, 'error');
            }
        }

        // ═══════════════════════════════════════════════════════════
        // 数据库操作
        // ═══════════════════════════════════════════════════════════
        async function testConnection() {
            try {
                showToast('正在测试连接...', 'success');
                const data = await api('/health');
                showToast('✅ 连接成功！' + new Date(data.timestamp).toLocaleString());
            } catch (e) {
                showToast('❌ 连接失败：' + e.message, 'error');
            }
        }

        async function refreshAll() {
            try {
                const data = await api('/show');
                state.databases = data.data || [];
                renderDatabases();
                updateStats();
                showToast('数据库列表已刷新', 'success');
            } catch (e) {
                if (e.message !== 'Not configured') {
                    showToast('刷新失败：' + e.message, 'error');
                }
            }
        }

        function renderDatabases() {
            const grid = document.getElementById('dbGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = state.databases.filter(db => 
                db.name.toLowerCase().includes(search)
            );

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>📦 ${state.databases.length === 0 ? '暂无数据库' : '无匹配结果'}</h3>
                        <p>${state.databases.length === 0 ? '点击上方按钮创建第一个数据库' : '尝试其他搜索关键词'}</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(db => `
                <div class="db-card" onclick="openDatabase('${db.name}')">
                    <div class="db-card-header">
                        <h3>📊 ${db.name}</h3>
                        <span style="color: var(--text-secondary); font-size: 0.85rem;">${(db.size / 1024).toFixed(1)} KB</span>
                    </div>
                    <div class="db-card-stats">
                        <span>📁 ${db.path}</span>
                    </div>
                    <div class="db-card-actions" onclick="event.stopPropagation()">
                        <button class="btn btn-primary" onclick="openDatabase('${db.name}')">查看</button>
                        <button class="btn btn-danger" onclick="dropDatabase('${db.name}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function filterDatabases() {
            renderDatabases();
        }

        async function createDatabase() {
            const name = document.getElementById('createName').value.trim();
            const description = document.getElementById('createDesc').value.trim();

            if (!name) {
                showToast('数据库名称不能为空', 'error');
                return;
            }

            try {
                await api('/create', 'POST', { name, description });
                showToast('数据库创建成功');
                closeModal('createModal');
                document.getElementById('createName').value = '';
                document.getElementById('createDesc').value = '';
                refreshAll();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function dropDatabase(name) {
            if (!confirm(`确定要删除数据库 "${name}" 吗？此操作不可恢复！`)) {
                return;
            }

            try {
                await api('/drop', 'POST', { name });
                showToast('数据库已删除');
                refreshAll();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function updateStats() {
            document.getElementById('statDatabases').textContent = state.databases.length;
            const totalSize = state.databases.reduce((sum, db) => sum + (db.size || 0), 0);
            document.getElementById('statSize').textContent = (totalSize / 1024).toFixed(1) + ' KB';
        }

        // ═══════════════════════════════════════════════════════════
        // 记录操作
        // ═══════════════════════════════════════════════════════════
        async function openDatabase(name) {
            state.currentDb = name;
            document.getElementById('viewTitle').textContent = `📊 ${name}`;
            openModal('viewModal');
            await refreshCurrentDb();
        }

        async function refreshCurrentDb() {
            if (!state.currentDb) return;

            try {
                const data = await api('/find', 'POST', { name: state.currentDb });
                state.currentRecords = data.data?.records || [];
                state.filteredRecords = [...state.currentRecords];
                renderRecords();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function renderRecords() {
            const table = document.getElementById('dataTable');
            const records = state.filteredRecords;

            if (records.length === 0) {
                table.innerHTML = '<tr><td style="text-align: center; padding: 40px;">暂无记录</td></tr>';
                return;
            }

            // 获取所有字段
            const allKeys = new Set();
            records.forEach(r => Object.keys(r).forEach(k => allKeys.add(k)));
            const keys = Array.from(allKeys);

            // 渲染表头
            table.querySelector('thead').innerHTML = `
                <tr>
                    ${keys.map(k => `<th>${k}</th>`).join('')}
                    <th>操作</th>
                </tr>
            `;

            // 渲染表体
            table.querySelector('tbody').innerHTML = records.map(r => `
                <tr>
                    ${keys.map(k => `<td>${JSON.stringify(r[k] ?? null)}</td>`).join('')}
                    <td>
                        <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" 
                                onclick="deleteRecord(${r.id})">删除</button>
                    </td>
                </tr>
            `).join('');

            // 更新统计
            document.getElementById('statRecords').textContent = state.currentRecords.length;
        }

        function filterRecords() {
            const search = document.getElementById('recordSearch').value.toLowerCase();
            state.filteredRecords = state.currentRecords.filter(r => 
                Object.values(r).some(v => String(v).toLowerCase().includes(search))
            );
            renderRecords();
        }

        function showAddRecordModal() {
            document.getElementById('recordData').value = '';
            openModal('addRecordModal');
        }

        async function addRecord() {
            const dataStr = document.getElementById('recordData').value.trim();
            
            if (!dataStr) {
                showToast('请输入数据', 'error');
                return;
            }

            try {
                const data = JSON.parse(dataStr);
                await api('/add', 'POST', { name: state.currentDb, data });
                showToast('记录添加成功');
                closeModal('addRecordModal');
                await refreshCurrentDb();
            } catch (e) {
                showToast(e.message === 'Unexpected token' ? 'JSON 格式错误' : e.message, 'error');
            }
        }

        async function deleteRecord(id) {
            if (!confirm(`确定要删除 ID 为 ${id} 的记录吗？`)) {
                return;
            }

            try {
                await api('/delete', 'POST', { 
                    name: state.currentDb, 
                    query: { id },
                    multi: false
                });
                showToast('记录已删除');
                await refreshCurrentDb();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        // ═══════════════════════════════════════════════════════════
        // 初始化
        // ═══════════════════════════════════════════════════════════
        function showCreateModal() {
            document.getElementById('createName').value = '';
            document.getElementById('createDesc').value = '';
            openModal('createModal');
        }

        // 页面加载时自动刷新
        refreshAll();
    </script>
</body>
</html>
